<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReÚtiles - Nueva Contraseña</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container">
        <h1>ReÚtiles</h1>
      </div>
    </div>
  </div>

  <div class="wrapper">
    <div class="container-inigistro">
      <h2>Nueva Contraseña</h2>
      <p style="color: #666; font-size: 14px; text-align: center; margin-bottom: 20px;">
        Ingresa tu nueva contraseña segura para actualizar tu cuenta.
      </p>
      
      <div id="statusMsg" class="error-container" style="display: none;">
        <i id="statusIcon" class="fas fa-exclamation-circle"></i>
        <span id="statusText"></span>
      </div>

      <form id="resetForm">
        <input type="password" name="password" placeholder="Nueva contraseña" required>
        <input type="password" name="confirmPassword" placeholder="Confirmar nueva contraseña" required>
        <button type="submit" id="resetBtn">Actualizar Contraseña</button>
      </form>
    </div>
  </div>

  <script>
    // Obtener el token que viene viajando en la URL (?token=XXXXX)
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const backendURL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
        ? 'http://127.0.0.1:25244' 
        : 'https://ecointercambio-backend-0ts7.onrender.com';

    if (!token) {
      alert("Enlace inválido. Falta el token de acceso.");
      window.location.href = "login.html";
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const statusMsg = document.getElementById('statusMsg');
      const statusText = document.getElementById('statusText');
      const statusIcon = document.getElementById('statusIcon');
      const resetBtn = document.getElementById('resetBtn');
      
      const password = e.target.password.value;
      const confirmPassword = e.target.confirmPassword.value;

      // Validación rápida en el Frontend de que coincidan las dos cajas
      if (password !== confirmPassword) {
        statusMsg.style.backgroundColor = '#fee2e2';
        statusMsg.style.color = '#dc2626';
        statusMsg.style.borderColor = '#fca5a5';
        statusIcon.className = "fas fa-exclamation-circle";
        statusText.innerText = "Las contraseñas no coinciden.";
        statusMsg.style.display = 'flex';
        return;
      }

      resetBtn.innerText = "Guardando...";
      resetBtn.disabled = true;
      statusMsg.style.display = 'none';

      try {
        const res = await fetch(`${backendURL}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (res.ok) {
          statusMsg.style.backgroundColor = '#dcfce7'; 
          statusMsg.style.color = '#16a34a';
          statusMsg.style.borderColor = '#bbf7d0';
          statusIcon.className = "fas fa-check-circle";
          statusText.innerText = data.message;
          statusMsg.style.display = 'flex';
          e.target.reset();

          setTimeout(() => {
            window.location.href = "login.html";
          }, 3000);
        } else {
          statusMsg.style.backgroundColor = '#fee2e2';
          statusMsg.style.color = '#dc2626';
          statusMsg.style.borderColor = '#fca5a5';
          statusIcon.className = "fas fa-exclamation-circle";
          statusText.innerText = data.error || "Error al actualizar";
          statusMsg.style.display = 'flex';
          resetBtn.innerText = "Actualizar Contraseña";
          resetBtn.disabled = false;
        }
      } catch (err) {
        statusText.innerText = "Error de conexión con el servidor";
        statusMsg.style.display = 'flex';
        resetBtn.innerText = "Actualizar Contraseña";
        resetBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
