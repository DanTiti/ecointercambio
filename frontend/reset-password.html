<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña | ReÚtiles</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container">
        <h1>ReÚtiles</h1>
      </div>
    </div>
  </div>

  <div class="wrapper">
    <div class="container-inigistro">
      <h2>Nueva Contraseña</h2>
      
      <div id="statusMsg" class="error-container" style="display: none;">
        <i id="statusIcon" class="fas fa-exclamation-circle"></i>
        <span id="statusText"></span>
      </div>

      <form id="resetForm">
        <div class="password-wrapper">
            <input type="password" name="password" id="password" placeholder="Nueva contraseña (mín. 8 caracteres)" required>
            <i class="fas fa-eye toggle-password" id="toggleIcon"></i>
        </div>
        <button type="submit" id="resetBtn">Guardar Contraseña</button>
      </form>
    </div>
  </div>

  <script>
    // Obtener el token de la URL que venía en el correo
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('statusMsg').style.display = 'flex';
      document.getElementById('statusMsg').style.backgroundColor = '#fee2e2';
      document.getElementById('statusMsg').style.color = '#dc2626';
      document.getElementById('statusText').innerText = "Enlace inválido o incompleto.";
      document.getElementById('resetBtn').disabled = true;
    }

    // Funcionalidad para mostrar/ocultar contraseña
    const toggleIcon = document.getElementById('toggleIcon');
    const passwordInput = document.getElementById('password');

    if (toggleIcon && passwordInput) {
    toggleIcon.addEventListener('click', function () {
        // Alternar el tipo de input
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Alternar el icono (ojo abierto / ojo cerrado con la diagonal)
        this.classList.toggle('fa-eye-slash');
    });
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const statusMsg = document.getElementById('statusMsg');
      const statusText = document.getElementById('statusText');
      const statusIcon = document.getElementById('statusIcon');
      const resetBtn = document.getElementById('resetBtn');
      const password = document.getElementById('password').value;
      
      resetBtn.innerText = "Guardando...";
      resetBtn.disabled = true;
      statusMsg.style.display = 'none';

      // 🔥 URL DE NGROK
      const URL_API = 'https://override-affluent-purgatory.ngrok-free.dev';

      try {
        const res = await fetch(`${URL_API}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            // 🔥 EL SALVAVIDAS PARA CELULARES
            'ngrok-skip-browser-warning': 'true' 
          },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (res.ok) {
          statusMsg.style.backgroundColor = '#dcfce7'; 
          statusMsg.style.color = '#16a34a';
          statusMsg.style.borderColor = '#bbf7d0';
          statusIcon.className = "fas fa-check-circle";
          statusText.innerText = data.message || "¡Contraseña actualizada con éxito!";
          statusMsg.style.display = 'flex';
          
          // Redirige al login después de 2 segundos
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          statusMsg.style.backgroundColor = '#fee2e2';
          statusMsg.style.color = '#dc2626';
          statusIcon.className = "fas fa-exclamation-circle";
          statusText.innerText = data.error || data.message || "Error al actualizar";
          statusMsg.style.display = 'flex';
          resetBtn.innerText = "Guardar Contraseña";
          resetBtn.disabled = false;
        }
      } catch (err) {
        statusMsg.style.backgroundColor = '#fee2e2';
        statusMsg.style.color = '#dc2626';
        statusIcon.className = "fas fa-exclamation-circle";
        statusText.innerText = "Error de conexión con el servidor.";
        statusMsg.style.display = 'flex';
        resetBtn.innerText = "Guardar Contraseña";
        resetBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
