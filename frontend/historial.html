<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Intercambios - ReUtiles</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo-container" onclick="location.href='inicio.html'" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-home" style="font-size: 1.5rem;"></i>
                <h1 style="margin: 0;">ReÚtiles</h1>
            </div>
            <div class="nav-main-actions">
                <button class="btn-visible" onclick="location.href='dashboard.html'"><i class="fas fa-plus"></i> Publicar</button>
                <button class="btn-visible" onclick="location.href='coincidencias.html'"><i class="fas fa-handshake"></i> Coincidencias</button>
                
                <div class="dropdown">
                    <button class="dropbtn" id="menuBtn"><i class="fas fa-bars"></i></button>
                        <div class="dropdown-content" id="myDropdown">
                            <a href="sugerencias.html"><i class="fas fa-lightbulb"></i> Sugerencias</a>
                            <a href="mis-publicaciones.html"><i class="fas fa-folder-open"></i> Mis publicaciones</a>
                            <a href="historial.html"><i class="fas fa-history"></i> Historial</a>
                            <a href="lista-chat.html"><i class="fas fa-comments"></i> Chats <span id="notif"></span></a>
                            <hr>
                            <a href="#" onclick="localStorage.clear(); location.href='login.html'" style="color: #d32f2f;">
                                <i class="fas fa-sign-out-alt"></i> Salir
                            </a>
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="container">
            <h2 style="text-align: center; margin-bottom: 30px;">Historial de intercambios</h2>
            <div id="intercambiados" class="grid-productos"></div>
        </div>
    </div>

    <footer class="main-footer">
        <p>&copy; <span id="year"></span> ReÚtiles - Proyecto Escolar</p>
    </footer>

    <script src="js/notificaciones.js"></script>
    <script src="js/menu.js"></script>

    <script>
        const userId = localStorage.getItem('userId');
        document.getElementById("year").textContent = new Date().getFullYear();

        if (!userId || userId === '0') location.href = 'login.html';

        function cargarHistorial() {
            fetch(`https://ecointercambio-backend-0ts7.onrender.com/api/productos/intercambiados/${userId}`)
                .then(res => res.json())
                .then(productos => {
                    const contenedor = document.getElementById('intercambiados');

                    if (!Array.isArray(productos) || productos.length === 0) {
                        contenedor.innerHTML = `
                            <div style="grid-column: 1/-1; text-align: center; margin-top: 50px; color: #888;">
                                <i class="fas fa-history fa-3x" style="margin-bottom: 15px;"></i>
                                <p>No tienes productos intercambiados aún.</p>
                            </div>`;
                        return;
                    }

                    contenedor.innerHTML = productos.map(p => `
                        <div class="producto" id="producto-${p.id}">
                            <div class="producto-eliminar">
                                <button class="eliminar" onclick="eliminarProducto(${p.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                            <img src="${p.imagen}" alt="Producto">
                            <div style="padding: 10px;">
                                <span style="font-size: 0.9rem; color: #666;"><i class="fas fa-user"></i> <b>${p.nombreUsuario}</b></span>
                                <p style="margin: 5px 0;">Ofreciste: ${p.ofrece}</p>
                                <p style="margin: 5px 0;">Buscaste: ${p.busca}</p>
                                <div style="margin-top: 10px;">
                                    <span style="background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold;">
                                        <i class="fas fa-check-circle"></i> Intercambiado
                                    </span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                });
        }

        async function eliminarProducto(id) {
            if (!confirm("¿Seguro que deseas eliminar este registro del historial?")) return;

            try {
                const res = await fetch(`https://ecointercambio-backend-0ts7.onrender.com/api/productos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });

                if (res.ok) {
                    const card = document.getElementById(`producto-${id}`);
                    if (card) card.remove();
                } else {
                    alert('Error al eliminar');
                }
            } catch (err) {
                alert('Error al conectar con el servidor');
            }
        }

        cargarHistorial();
    </script>
</body>
</html>
