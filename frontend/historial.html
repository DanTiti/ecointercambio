<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Intercambios - ReUtiles</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo-container" onclick="location.href='inicio.html'" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-home" style="font-size: 1.5rem;"></i>
                <h1 style="margin: 0;">ReÚtiles</h1>
            </div>
            <div class="nav-main-actions">
                <button class="btn-visible" onclick="location.href='dashboard.html'"><i class="fas fa-plus"></i> Publicar</button>
                <button class="btn-visible" onclick="location.href='coincidencias.html'"><i class="fas fa-handshake"></i> Coincidencias</button>
                <div class="dropdown">
                    <button class="dropbtn" id="menuBtn"><i class="fas fa-bars"></i></button>
                    <div class="dropdown-content" id="myDropdown">
                        <a href="sugerencias.html"><i class="fas fa-lightbulb"></i> Sugerencias</a>
                        <a href="mis-publicaciones.html"><i class="fas fa-folder-open"></i> Mis publicaciones</a>
                        <a href="historial.html"><i class="fas fa-history"></i> Historial</a>
                        <a href="lista-chat.html"><i class="fas fa-comments"></i> Chats <span id="notif"></span></a>
                        <hr>
                        <a href="#" onclick="confirmarCerrarSesion()" style="color: #d32f2f;">
                            <i class="fas fa-sign-out-alt"></i> Salir
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="container">
            <h2 style="text-align: center; margin-bottom: 30px;">Historial de intercambios</h2>
            <div id="intercambiados" class="grid-productos"></div>
        </div>
    </div>

    <footer class="main-footer">
        <p>&copy; <span id="year"></span> ReÚtiles - Proyecto Escolar</p>
    </footer>

    <script src="js/notificaciones.js"></script>
    <script src="js/menu.js"></script>

    <script>
        const userId = localStorage.getItem('userId');
        document.getElementById("year").textContent = new Date().getFullYear();

        if (!userId || userId === '0') location.href = 'login.html';

        function cargarHistorial() {
            fetch(`${backendURL}/api/transacciones/historial-completo/${userId}`)
                .then(res => res.json())
                .then(productos => {
                    const contenedor = document.getElementById('intercambiados');

                    if (!Array.isArray(productos) || productos.length === 0) {
                        contenedor.innerHTML = `<div style="grid-column: 1/-1; text-align: center; margin-top: 50px; color: #888;">
                            <i class="fas fa-history fa-3x" style="margin-bottom: 15px;"></i>
                            <p>No tienes productos intercambiados aún.</p></div>`;
                        return;
                    }

                    contenedor.innerHTML = productos.map(p => {
                        const img = p.miProductoImagen || 'img/default.png';
                        const imgRecibida = p.productoObtenidoImagen || 'img/default.png';

                        return `
                            <div class="producto" id="transaccion-${p.transaccion_id}">
                                <div class="producto-eliminar">
                                    <button class="eliminar" onclick="eliminarRegistro(${p.transaccion_id})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                                <img src="${img}" alt="Producto" onerror="this.src='img/default.png'">
                                <div style="padding: 10px;">
                                    <p style="font-size: 0.85rem; color: #555;"><b>Con:</b> ${p.nombreUsuarioCambiado || 'Usuario'}</p>
                                    <p style="margin: 5px 0;"><b>Entregaste:</b> ${p.miProductoNombre || '...'}</p>
                                    <p style="margin: 5px 0;"><b>Recibiste:</b> ${p.productoObtenidoNombre || '...'}</p>
                                    <div style="margin-top: 10px;">
                                        <span style="background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold;">
                                            <i class="fas fa-check-circle"></i> Completado
                                        </span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                });
        }

        async function eliminarRegistro(transaccionId) {
            const result = await Swal.fire({
                title: '¿Eliminar historial?',
                text: "Esta acción borrará el registro visual de este intercambio.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            });

            if (result.isConfirmed) {
                // Si tienes ruta en el backend para borrar: 
                // await fetch(...)
                
                // Efecto visual de borrado inmediato
                const card = document.getElementById(`transaccion-${transaccionId}`);
                if (card) {
                    card.style.transition = "opacity 0.5s ease";
                    card.style.opacity = "0";
                    setTimeout(() => card.remove(), 500);
                }
                
                Swal.fire({
                    icon: 'success',
                    title: 'Eliminado',
                    text: 'El registro ha sido borrado.',
                    timer: 1500,
                    showConfirmButton: false
                });
            }
        }

        cargarHistorial();
    </script>
</body>
</html>
