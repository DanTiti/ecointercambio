<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat en tiempo real - ReUtiles</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container" onclick="location.href='inicio.html'" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
        <i class="fas fa-home" style="font-size: 1.5rem;"></i>
        <h1 style="margin: 0;">ReÚtiles</h1>
      </div>
      <div class="nav-main-actions">
        <button onclick="location.href='dashboard.html'"><i class="fas fa-plus"></i>Publicar</button>
        <button onclick="location.href='coincidencias.html'"><i class="fas fa-handshake"></i> Coincidencias</button>
        
        <div class="dropdown">
          <button class="dropbtn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="dropdown-content" id="myDropdown">
                <a href="sugerencias.html"><i class="fas fa-lightbulb"></i> Sugerencias</a>
                <a href="mis-publicaciones.html"><i class="fas fa-folder-open"></i> Mis publicaciones</a>
                <a href="historial.html"><i class="fas fa-history"></i> Historial</a>
                <a href="lista-chat.html"><i class="fas fa-comments"></i> Chats <span id="notif"></span></a>
                <hr>
                <a href="#" onclick="confirmarCerrarSesion()" style="color: #d32f2f;">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </div>
        </div>
      </div>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="container">
      <div class="chat-container">
        <div class="chat-header">
          <button class="btn-back" onclick="location.href='lista-chat.html'"><i class="fas fa-arrow-left"></i></button>
          <h2>Chat con <span id="nombreReceptor"></span></h2>
        </div>
        
        <div id="mensajes" class="mensajes"></div>
        
        <form id="formChat" class="form-chat">
          <textarea id="textoMensaje" placeholder="Escribe tu mensaje..." required></textarea>
          <button type="submit" class="btn-send">
            <i class="fas fa-paper-plane"></i> Enviar
          </button>
        </form>
      </div>
    </div>
  </div>

  <footer class="main-footer">
    <p>&copy; <span id="year"></span> ReÚtiles - Proyecto Escolar</p>
  </footer>

  <script src="js/menu.js"></script>

  <script>
    const socket = io('https://ecointercambio-backend-0ts7.onrender.com');
    const userId = localStorage.getItem('userId');
    const contactoId = localStorage.getItem('contactoId');
    const contactoNombre = localStorage.getItem('contactoNombre') || 'usuario desconocido';

    if (!userId || !contactoId) location.href = 'inicio.html';
    document.getElementById('nombreReceptor').innerText = contactoNombre;

    const mensajesDiv = document.getElementById('mensajes');
    const textoMensaje = document.getElementById('textoMensaje');
    const formChat = document.getElementById('formChat');
    const notifSpan = document.getElementById('notif');

    function actualizarContadorGlobal() {
      fetch(`https://ecointercambio-backend-0ts7.onrender.com/api/mensajes/no-leidos/${userId}`)
        .then(res => res.json())
        .then(data => {
          const chatsDeOtros = data.filter(item => item.de_usuario != contactoId);
          const totalChatsNuevos = chatsDeOtros.length;

          if (totalChatsNuevos > 0) {
            notifSpan.innerText = ` (${totalChatsNuevos})`;
            notifSpan.style.color = "red";
          } else {
            notifSpan.innerText = '';
          }
        });
    }

    function marcarMensajesComoLeidos() {
      fetch(`https://ecointercambio-backend-0ts7.onrender.com/api/mensajes/marcar-leidos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ de_usuario: contactoId, para_usuario: userId })
      })
      .then(() => actualizarContadorGlobal());
    }

    fetch(`https://ecointercambio-backend-0ts7.onrender.com/api/mensajes/entre/${userId}/${contactoId}`)
      .then(res => res.json())
      .then(mensajes => {
        mensajesDiv.innerHTML = '';
        mensajes.forEach(m => {
          const div = document.createElement('div');
          const nombre = m.de_usuario == userId ? 'Tú' : m.nombre_otro_usuario;
          div.className = m.de_usuario == userId ? 'mensaje propio' : 'mensaje ajeno';
          div.innerHTML = `<b>${nombre}:</b> ${m.mensaje}`;
          mensajesDiv.appendChild(div);
        });
        mensajesDiv.scrollTop = mensajesDiv.scrollHeight;
        marcarMensajesComoLeidos();
      });

    socket.on(`mensaje-${userId}`, (data) => {
      if (data.de_usuario == contactoId) {
        const nuevo = document.createElement('div');
        nuevo.className = 'mensaje ajeno';
        nuevo.innerHTML = `<b>${contactoNombre}:</b> ${data.mensaje}`;
        mensajesDiv.appendChild(nuevo);
        mensajesDiv.scrollTop = mensajesDiv.scrollHeight;
        marcarMensajesComoLeidos();
      } else {
        actualizarContadorGlobal();
      }
    });

    formChat.addEventListener('submit', (e) => {
      e.preventDefault();
      const texto = textoMensaje.value.trim();
      if (texto === '') return;
      socket.emit('mensaje', { de_usuario: userId, para_usuario: contactoId, mensaje: texto });
      
      const div = document.createElement('div');
      div.className = 'mensaje propio';
      div.innerHTML = `<b>Tú:</b> ${texto}`;
      mensajesDiv.appendChild(div);
      mensajesDiv.scrollTop = mensajesDiv.scrollHeight;
      textoMensaje.value = '';
    });

    textoMensaje.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        formChat.requestSubmit();
      }
    });

    actualizarContadorGlobal();
  </script>
</body>
</html>
