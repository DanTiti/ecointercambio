<!DOCTYPE html>
<html lang="es">
  
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sugerencias - ReUtiles</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container" onclick="location.href='inicio.html'" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
        <i class="fas fa-home" style="font-size: 1.5rem;"></i>
        <h1 style="margin: 0;">ReÚtiles</h1>
      </div>
      <div class="nav-main-actions">
        <button class="btn-visible" onclick="location.href='dashboard.html'"><i class="fas fa-plus"></i> Publicar</button>
        <button class="btn-visible" onclick="location.href='coincidencias.html'"><i class="fas fa-handshake"></i> Coincidencias</button>
        
        <div class="dropdown">
          <button class="dropbtn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="dropdown-content" id="myDropdown">
                <a href="sugerencias.html"><i class="fas fa-lightbulb"></i> Sugerencias</a>
                <a href="mis-publicaciones.html"><i class="fas fa-folder-open"></i> Mis publicaciones</a>
                <a href="historial.html"><i class="fas fa-history"></i> Historial</a>
                <a href="lista-chat.html"><i class="fas fa-comments"></i> Chats <span id="notif"></span></a>
                <hr>
                <a href="#" onclick="confirmarCerrarSesion()" style="color: #d32f2f;">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </div>
        </div>
      </div>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="container">
      <div style="text-align: center; margin-bottom: 30px;">
        <h2 style="color: #333;"><i class="fas fa-lightbulb" style="color: #fbc02d;"></i> Sugerencias para ti</h2>
        <p style="color: #666;">Basado en los útiles que estás buscando actualmente.</p>
      </div>

      <div id="sugerencias" class="grid-productos"></div>
    </div>
  </div>

  <footer class="main-footer">
    <p>&copy; <span id="year"></span> ReÚtiles - Proyecto Escolar</p>
  </footer>

  <script src="js/notificaciones.js"></script>
  <script src="js/menu.js"></script>

  <script>
    const userId = localStorage.getItem('userId');
    document.getElementById("year").textContent = new Date().getFullYear();
    
    if (!userId || userId === '0') location.href = 'login.html';

    function abrirMensaje(usuarioId, nombreUsuario) {
      const decoded = decodeURIComponent(nombreUsuario);
      localStorage.setItem('contactoId', usuarioId);
      localStorage.setItem('contactoNombre', decoded);
      location.href = 'enviar-mensaje.html';
    }

    async function cargarSugerencias() {
      try {
        const res = await fetch(`https://ecointercambio-backend-0ts7.onrender.com/api/sugerencias/${userId}`);
        const sugerencias = await res.json();
        const contenedor = document.getElementById('sugerencias');

        if (!Array.isArray(sugerencias) || sugerencias.length === 0) {
          contenedor.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; margin-top: 50px; color: #888;">
              <i class="fas fa-ghost fa-3x" style="margin-bottom: 15px;"></i>
              <p>No se encontraron sugerencias por ahora. ¡Intenta publicar más útiles!</p>
            </div>`;
          return;
        }

        contenedor.innerHTML = sugerencias.map(p => `
          <div class="producto" onclick="abrirMensaje(${p.usuario_id}, '${encodeURIComponent(p.nombreUsuario)}')" style="cursor: pointer;">
            <div style="position: relative;">
              <img src="${p.imagen}" alt="Sugerencia">
              <span style="position: absolute; top: 10px; left: 10px; background: #fbc02d; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold;">
                RECOMENDADO
              </span>
            </div>
            <div style="padding: 15px;">
              <span style="font-size: 0.85rem; color: #666;"><i class="fas fa-user"></i> <b>${p.nombreUsuario}</b> ofrece:</span>
              <p style="margin: 5px 0; font-size: 1.1rem; color: #333;"><b>${p.loQueOfrece}</b></p>
              <p style="font-size: 0.8rem; color: #1e88e5; margin-top: 10px;">
                <i class="fas fa-search"></i> Coincide con tu búsqueda de: <b>${p.loQueBusco}</b>
              </p>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error("Error al cargar sugerencias:", error);
      }
    }

    cargarSugerencias();
  </script>
</body>
</html>
