<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Chats - ReUtiles</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo-container" onclick="location.href='inicio.html'" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-home" style="font-size: 1.5rem;"></i>
                <h1 style="margin: 0;">ReÚtiles</h1>
            </div>
            <div class="nav-main-actions">
                <button onclick="location.href='dashboard.html'"><i class="fas fa-plus"></i> Publicar</button>
                <button onclick="location.href='coincidencias.html'"><i class="fas fa-handshake"></i> Coincidencias</button>
                
                <div class="dropdown">
                    <button class="dropbtn" id="menuBtn"><i class="fas fa-bars"></i></button>
                        <div class="dropdown-content" id="myDropdown">
                            <a href="sugerencias.html"><i class="fas fa-lightbulb"></i> Sugerencias</a>
                            <a href="mis-publicaciones.html"><i class="fas fa-folder-open"></i> Mis publicaciones</a>
                            <a href="historial.html"><i class="fas fa-history"></i> Historial</a>
                            <a href="lista-chat.html"><i class="fas fa-comments"></i> Chats <span id="notif"></span></a>
                            <hr>
                            <a href="#" onclick="confirmarCerrarSesion()" style="color: #d32f2f;">
                                <i class="fas fa-sign-out-alt"></i> Salir
                            </a>
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="container">
            <h2><i class="fas fa-comments"></i> Tus Conversaciones</h2>
            <div id="listaChats">
                </div>
        </div>
    </div>

    <footer class="main-footer">
        <p>&copy; <span id="year"></span> ReÚtiles - Proyecto Escolar</p>
    </footer>

    <script src="js/menu.js"></script>

    <script>
        const userId = localStorage.getItem('userId');
        const notifSpan = document.getElementById('notif');
        document.getElementById("year").textContent = new Date().getFullYear();

        const backendURL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
            ? 'http://127.0.0.1:25244' 
            : 'https://ecointercambio-backend-0ts7.onrender.com';

        if (!userId) location.href = 'login.html';

        fetch(`${backendURL}/api/mensajes/chats/${userId}`)
            .then(res => res.json())
            .then(chats => {
                const listaChatsDiv = document.getElementById('listaChats');
                listaChatsDiv.innerHTML = '';
                
                if (!Array.isArray(chats) || chats.length === 0) {
                    listaChatsDiv.innerHTML = `
                        <div style="text-align: center; margin-top: 50px; color: #888;">
                            <i class="fas fa-comment-slash fa-3x"></i>
                            <p style="margin-top: 15px;">No tienes chats activos aún.</p>
                        </div>`;
                } else {
                    chats.forEach(chat => {
                        const div = document.createElement('div');
                        div.className = 'chat-item';
                        div.innerHTML = `
                            <div class="chat-info" style="display: flex; flex-direction: column; gap: 5px; flex: 1;">
                                <span class="nickname" style="font-weight: bold; color: #1e88e5; display: flex; align-items: center; gap: 10px;">
                                    <i class="fas fa-user-circle"></i> ${chat.nickname}
                                </span>
                                <span class="lastMessage" style="color: #666; font-size: 0.9rem; margin-left: 28px;">
                                    ${chat.lastMessage || 'Haz clic para empezar a chatear...'}
                                </span>
                            </div>
                            <div class="chat-arrow">
                                <i class="fas fa-chevron-right" style="color: #ccc;"></i>
                            </div>
                        `;
                        div.onclick = () => {
                            localStorage.setItem('contactoId', chat.userId);
                            localStorage.setItem('contactoNombre', chat.nickname);
                            location.href = 'chat.html';
                        };
                        listaChatsDiv.appendChild(div);
                    });
                }
            });

        function actualizarContadorGlobal() {
            fetch(`${backendURL}/api/mensajes/no-leidos/${userId}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        notifSpan.innerText = ` (${data.length})`;
                        notifSpan.style.color = "red";
                    } else {
                        notifSpan.innerText = '';
                    }
                });
        }
        actualizarContadorGlobal();
    </script>
</body>
</html>
