<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coincidencias - ReUtiles</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container" onclick="location.href='inicio.html'" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
        <i class="fas fa-home" style="font-size: 1.5rem;"></i>
        <h1 style="margin: 0;">ReÚtiles</h1>
      </div>
      <div class="nav-main-actions">
        <button class="btn-visible" onclick="location.href='dashboard.html'"><i class="fas fa-plus"></i> Publicar</button>
        
        <div class="dropdown">
          <button class="dropbtn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="dropdown-content" id="myDropdown">
                <a href="sugerencias.html"><i class="fas fa-lightbulb"></i> Sugerencias</a>
                <a href="mis-publicaciones.html"><i class="fas fa-folder-open"></i> Mis publicaciones</a>
                <a href="historial.html"><i class="fas fa-history"></i> Historial</a>
                <a href="lista-chat.html"><i class="fas fa-comments"></i> Chats <span id="notif"></span></a>
                <hr>
                <a href="#" onclick="confirmarCerrarSesion()" style="color: #d32f2f;">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </div>
        </div>
      </div>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="container">
      <div class="section-header" style="text-align: center; margin-bottom: 30px;">
        <h2 style="color: #333;"><i class="fas fa-handshake" style="color: #1e88e5;"></i> Tus Coincidencias</h2>
        <p style="color: #666;">Encontramos usuarios que buscan lo que tú tienes o viceversa.</p>
      </div>

      <div id="matches" class="grid-productos"></div> 
    </div>
  </div>

  <footer class="main-footer">
    <p>&copy; <span id="year"></span> ReÚtiles - Proyecto Escolar</p>
  </footer>
  
  <script src="js/notificaciones.js"></script>
  <script src="js/menu.js"></script>

  <script>
    const userId = localStorage.getItem('userId');
    document.getElementById("year").textContent = new Date().getFullYear();

    if (!userId || userId === '0') location.href = 'login.html';

    async function cargarMatches() {
      try {
        const res = await fetch(`https://ecointercambio-backend-0ts7.onrender.com/api/match/${userId}`);
        const matches = await res.json();
        const contenedor = document.getElementById('matches');

        if (!matches || matches.length === 0) {
          contenedor.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; margin-top: 50px;">
              <i class="fas fa-search fa-3x" style="color: #ccc; margin-bottom: 15px;"></i>
              <p style="color: #888; font-size: 1.1rem;">No se encontraron coincidencias aún. ¡Sigue publicando!</p>
            </div>`;
          return;
        }

        contenedor.innerHTML = matches.map(m => {
          let colorLabel = '';
          let iconMatch = '';
          
          if(m.tipo === 'perfecto') { colorLabel = '#2e7d32'; iconMatch = 'fa-check-double'; }
          else if(m.tipo === 'categoria') { colorLabel = '#1e88e5'; iconMatch = 'fa-shapes'; }
          else { colorLabel = '#f9a825'; iconMatch = 'fa-exchange-alt'; }

          return `
            <div class="producto match-card" onclick="abrirMensaje(${m.usuario}, '${encodeURIComponent(m.nombreUsuario)}')" style="border-top: 5px solid ${colorLabel}; cursor: pointer;">
              <div style="position: relative;">
                <img src="${m.imagen}" alt="Producto" style="height: 180px; object-fit: cover;">
                <span style="position: absolute; top: 10px; right: 10px; background: ${colorLabel}; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;">
                  <i class="fas ${iconMatch}"></i> ${m.tipo.toUpperCase()}
                </span>
              </div>
              <div style="padding: 15px;">
                <span style="font-size: 0.85rem; color: #666;"><i class="fas fa-user"></i> <b>${m.nombreUsuario}</b> ofrece:</span>
                <p style="margin: 5px 0; font-size: 1.1rem; color: #333;"><b>${m.ofreceEl}</b></p>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
                <p style="font-size: 0.85rem; color: #666; margin: 0;">Él busca: <span style="color: #d32f2f;">${m.buscaEl}</span></p>
                <p style="font-size: 0.85rem; color: #666; margin: 5px 0 0 0;">Tú buscas: <span style="color: #1e88e5;">${m.buscaYo}</span></p>
                <div style="margin-top: 15px; text-align: center;">
                  <button class="btn-send" style="width: 100%; padding: 8px; font-size: 0.9rem;">
                    <i class="fas fa-comments"></i> Proponer Intercambio
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error("Error al cargar matches:", err);
      }
    }

    function abrirMensaje(usuarioId, nombreUsuario) {
      localStorage.setItem('contactoId', usuarioId);
      localStorage.setItem('contactoNombre', decodeURIComponent(nombreUsuario));
      location.href = 'enviar-mensaje.html';
    }
    
    cargarMatches();
  </script>
</body>
</html>
