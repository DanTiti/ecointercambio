<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enviar Propuesta - ReÚtiles</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container" onclick="location.href='inicio.html'" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
        <i class="fas fa-home" style="font-size: 1.5rem;"></i>
        <h1 style="margin: 0;">ReÚtiles</h1>
      </div>
      <div class="nav-main-actions">
        <button class="btn-visible" onclick="location.href='dashboard.html'"><i class="fas fa-plus"></i> Publicar</button>
        <button class="btn-visible" onclick="location.href='coincidencias.html'"><i class="fas fa-handshake"></i> Coincidencias</button>
        <div class="dropdown">
          <button class="dropbtn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="dropdown-content" id="myDropdown">
                <a href="sugerencias.html"><i class="fas fa-lightbulb"></i> Sugerencias</a>
                <a href="mis-publicaciones.html"><i class="fas fa-folder-open"></i> Mis publicaciones</a>
                <a href="historial.html"><i class="fas fa-history"></i> Historial</a>
                <a href="lista-chat.html"><i class="fas fa-comments"></i> Chats <span id="notif"></span></a>
                <hr>
                <a href="#" onclick="confirmarCerrarSesion()" style="color: #d32f2f;">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </div>
        </div>
      </div>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="container">
      <div class="chat-container" style="max-width: 600px; margin: 40px auto; padding: 30px;">
        <div class="chat-header" style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
            <button onclick="history.back()" style="background: none; color: #1e88e5; font-size: 1.2rem; border: none; cursor: pointer;">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2 style="margin: 0;">Proponer trato a <span id="nombreDestinatario" style="color: #1e88e5;">...</span></h2>
        </div>

        <form id="formMensaje" class="form-chat" style="display: flex; flex-direction: column; gap: 15px;">
            <p style="color: #666; font-size: 0.95rem; font-weight:bold;">1. Selecciona qué producto vas a dar a cambio:</p>
            <select id="selectMiProducto" required style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 1rem;">
                <option value="">Cargando tus publicaciones...</option>
            </select>

            <p style="color: #666; font-size: 0.95rem; font-weight:bold; margin-top: 10px;">2. Escribe tu mensaje:</p>
            <textarea id="mensaje" placeholder="Hola, me gustaría intercambiar esto..." required 
                style="width:100%; height:120px; padding: 15px; border-radius: 12px; border: 1px solid #ddd; resize: none; font-family: inherit;"></textarea>
            
            <button type="submit" class="btn-send" style="width: 100%; padding: 15px; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fas fa-paper-plane"></i> Enviar Propuesta
            </button>
        </form>
      </div>
    </div>
  </div>

  <footer class="main-footer">
    <p>&copy; <span id="year"></span> ReÚtiles - Proyecto Escolar</p>
  </footer>

  <script src="js/menu.js"></script>
  <script>
    const userId = localStorage.getItem('userId');
    const contactoId = localStorage.getItem('contactoId');
    const contactoNombre = localStorage.getItem('contactoNombre');
    const productoId = localStorage.getItem('currentProductId');
    const notifSpan = document.getElementById('notif');
    const backendURL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
      ? 'http://127.0.0.1:25244' 
      : 'https://ecointercambio-backend-0ts7.onrender.com';
    
    document.getElementById("year").textContent = new Date().getFullYear();
    document.getElementById('nombreDestinatario').innerText = contactoNombre || 'usuario';

    if (!userId || !contactoId || !productoId) {
      Swal.fire('Error', 'Faltan datos del producto o contacto.', 'error').then(() => {
        location.href = 'inicio.html';
      });
    }

    async function cargarMisProductos() {
        try {
            const res = await fetch(`${backendURL}/api/productos/usuario/${userId}`);
            const prods = await res.json();
            const sel = document.getElementById('selectMiProducto');
            sel.innerHTML = '<option value="">-- Selecciona el artículo que ofreces --</option>';
            prods.filter(p => p.estado !== 'intercambiado').forEach(p => {
                sel.innerHTML += `<option value="${p.id}">${p.ofrece}</option>`;
            });
        } catch (error) {
            console.error("Error al cargar productos:", error);
        }
    }

    document.getElementById('formMensaje').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const mensaje = document.getElementById('mensaje').value.trim();
      const miProductoId = document.getElementById('selectMiProducto').value;
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando Propuesta...';

      try {
        const res = await fetch(`${backendURL}/api/mensajes/enviar-propuesta`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            de_usuario: userId,
            para_usuario: contactoId,
            producto_id: productoId,
            producto_cambio_id: miProductoId,
            mensaje: mensaje
          })
        });

        if (res.ok) {
          await Swal.fire({
            icon: 'success',
            title: '¡Propuesta enviada!',
            text: 'El usuario recibirá tu oferta.',
            timer: 2000,
            showConfirmButton: false
          });
          location.href = 'chat.html';
        } else {
          Swal.fire('Error', 'No se pudo enviar la propuesta.', 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar Propuesta';
        }
      } catch (err) {
        Swal.fire('Error', 'Error de conexión con el servidor.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar Propuesta';
      }
    });

    async function actualizarContador() {
      const res = await fetch(`${backendURL}/api/mensajes/no-leidos/${userId}`);
      const data = await res.json();
      if (data && data.length > 0) {
        notifSpan.innerText = ` (${data.length})`;
        notifSpan.style.color = "red";
      }
    }
    
    cargarMisProductos();
    actualizarContador();
  </script>
</body>
</html>
