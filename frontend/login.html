<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReÚtiles - Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Estilo profesional y centrado */
    .forgot-link-container {
      text-align: center;
      margin: 15px 0 20px 0;
    }
    .forgot-link {
      font-size: 0.9rem;
      color: #1e88e5;
      text-decoration: none;
      transition: all 0.2s ease;
      font-weight: 500;
    }
    .forgot-link:hover {
      color: #1565c0;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container">
        <h1>ReÚtiles</h1>
      </div>
    </div>
  </div>

  <div class="wrapper">
    <div class="container-inigistro">
      <h2>Iniciar Sesión</h2>
      
      <div id="errorMsg" class="error-container">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <form id="loginForm">
        <input type="email" name="email" placeholder="Correo electrónico" required>
        <div class="password-wrapper">
          <input type="password" name="password" id="password" placeholder="Contraseña" required>
          <i class="fas fa-eye toggle-password" id="toggleIcon"></i>
        </div>
        
        <div class="forgot-link-container">
          <a href="forgot-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" id="loginBtn">Entrar</button>
      </form>

      <div class="link">
        ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
      </div>
    </div>
  </div>
  
  <script src="js/notificaciones.js"></script>
  <script>
    const toggleIcon = document.getElementById('toggleIcon');
    const passwordInput = document.getElementById('password');

    if (toggleIcon && passwordInput) {
      toggleIcon.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
      });
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');
      const loginBtn = document.getElementById('loginBtn');
      
      loginBtn.innerText = "Cargando...";
      loginBtn.disabled = true;
      errorMsg.style.display = 'none';

      const form = e.target;
      const email = form.email.value;
      const password = form.password.value;

      try {
        const res = await fetch('https://ecointercambio-backend-0ts7.onrender.com/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("userId", data.userId);
          localStorage.setItem("nickname", data.nickname);
          window.location.href = "inicio.html";
        } else {
          errorText.innerText = data.error || "Error al iniciar sesión";
          errorMsg.style.display = 'flex';
          loginBtn.innerText = "Entrar";
          loginBtn.disabled = false;
        }
      } catch (err) {
        errorText.innerText = "Error de conexión con el servidor";
        errorMsg.style.display = 'flex';
        loginBtn.innerText = "Entrar";
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
