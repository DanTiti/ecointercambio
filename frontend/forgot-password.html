<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña | ReÚtiles</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container">
        <h1>ReÚtiles</h1>
      </div>
    </div>
  </div>

  <div class="wrapper">
    <div class="container-inigistro">
      <h2>Recuperar Contraseña</h2>
      
      <div id="statusMsg" class="error-container" style="display: none;">
        <i id="statusIcon" class="fas fa-exclamation-circle"></i>
        <span id="statusText"></span>
      </div>

      <form id="forgotForm">
        <input type="email" name="email" id="email" placeholder="Ingresa tu correo electrónico" required>
        <button type="submit" id="forgotBtn">Enviar enlace de recuperación</button>
      </form>

      <div class="link">
        ¿Recordaste tu contraseña? <a href="login.html">Iniciar sesión</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const statusMsg = document.getElementById('statusMsg');
      const statusText = document.getElementById('statusText');
      const statusIcon = document.getElementById('statusIcon');
      const forgotBtn = document.getElementById('forgotBtn');
      const email = document.getElementById('email').value;
      
      forgotBtn.innerText = "Enviando...";
      forgotBtn.disabled = true;
      statusMsg.style.display = 'none';
      const URL_API = 'https://override-affluent-purgatory.ngrok-free.dev';

      try {
        const res = await fetch(`${URL_API}/api/auth/forgot-password`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true' 
          },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
          statusMsg.style.backgroundColor = '#dcfce7'; 
          statusMsg.style.color = '#16a34a';
          statusMsg.style.borderColor = '#bbf7d0';
          statusIcon.className = "fas fa-check-circle";
          statusText.innerText = data.message || "Correo enviado con éxito. Revisa tu bandeja.";
          statusMsg.style.display = 'flex';
          
          document.getElementById('forgotForm').reset();
          forgotBtn.innerText = "Enviar enlace de recuperación";
          forgotBtn.disabled = false;
        } else {
          statusMsg.style.backgroundColor = '#fee2e2';
          statusMsg.style.color = '#dc2626';
          statusIcon.className = "fas fa-exclamation-circle";
          statusText.innerText = data.error || data.message || "Error al solicitar recuperación";
          statusMsg.style.display = 'flex';
          forgotBtn.innerText = "Enviar enlace de recuperación";
          forgotBtn.disabled = false;
        }
      } catch (err) {
        statusMsg.style.backgroundColor = '#fee2e2';
        statusMsg.style.color = '#dc2626';
        statusIcon.className = "fas fa-exclamation-circle";
        statusText.innerText = "Error de conexión con el servidor.";
        statusMsg.style.display = 'flex';
        forgotBtn.innerText = "Enviar enlace de recuperación";
        forgotBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
