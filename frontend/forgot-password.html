<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - ReÚtiles</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .info-text { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
    .success-msg { background: #dcfce7; color: #16a34a; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container">
        <h1>ReÚtiles</h1>
      </div>
    </div>
  </div>

  <div class="wrapper">
    <div class="container-inigistro">
      <h2>Recuperar Contraseña</h2>
      <p class="info-text">Ingresa tu correo electrónico registrado y te enviaremos las instrucciones para restablecer tu acceso.</p>
      
      <div id="msgBox" class="error-container" style="display: none;"></div>
      <div id="successBox" class="success-msg">
        <i class="fas fa-check-circle"></i> Correo enviado correctamente. Revisa tu bandeja de entrada.
      </div>

      <form id="forgotForm">
        <input type="email" name="email" placeholder="Correo electrónico" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
        <button type="submit" id="submitBtn" style="width: 100%; padding: 12px; background: #1e88e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
            Enviar instrucciones
        </button>
      </form>

      <div class="link" style="margin-top: 20px;">
        <a href="login.html" style="color: #1e88e5; font-size: 14px;">← Volver a iniciar sesión</a>
      </div>
    </div>
  </div>
  
  <script src="js/notificaciones.js"></script>

  <script>
    const forgotForm = document.getElementById('forgotForm');
    const msgBox = document.getElementById('msgBox');
    const successBox = document.getElementById('successBox');
    const submitBtn = document.getElementById('submitBtn');

    // URL ESCRITA A MANO PARA EVITAR ERRORES
    const URL_API = 'https://ecointercambio-backend-0ts7.onrender.com';

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.innerText = "Enviando...";
      submitBtn.disabled = true;
      msgBox.style.display = 'none';

      const email = forgotForm.email.value;

      try {
        console.log("Intentando conectar a:", `${URL_API}/api/auth/forgot-password`);
        
        const res = await fetch(`${URL_API}/api/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
          successBox.style.display = 'block';
          forgotForm.style.display = 'none';
        } else {
          msgBox.innerText = data.error || "Error al procesar la solicitud";
          msgBox.style.display = 'flex';
          submitBtn.innerText = "Enviar instrucciones";
          submitBtn.disabled = false;
        }
      } catch (err) {
        console.error("Error técnico:", err);
        // ESTA ALERTA TE DIRÁ SI ES CORS, RED, O DNS
        alert("Error de conexión (Detalle: " + err.message + "). Verifica la consola (F12).");
        
        msgBox.innerText = "Error de conexión. Intenta de nuevo.";
        msgBox.style.display = 'flex';
        submitBtn.innerText = "Enviar instrucciones";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
