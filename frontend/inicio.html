<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReUtiles - Inicio</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .producto { position: relative; }
    .btn-reportar-bandera {
      position: absolute; top: 10px; right: 10px; background: rgba(255, 255, 255, 0.9);
      border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      z-index: 10;
    }
    .btn-reportar-bandera:hover { transform: scale(1.1); background: #fff; }
    .btn-reportar-bandera i { color: #9ca3af; }
    .btn-reportar-bandera:hover i { color: #dc2626; }
    .rating-stars { color: #f59e0b; font-size: 0.8rem; margin: 5px 0; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <div class="navbar">
    <div class="nav-container">
      <div class="logo-container" onclick="location.href='inicio.html'" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
        <i class="fas fa-home" style="font-size: 1.5rem;"></i>
        <h1 style="margin: 0;">ReÚtiles</h1>
      </div>
      <div class="nav-main-actions">
        <button class="btn-visible" onclick="location.href='dashboard.html'"><i class="fas fa-plus"></i> Publicar</button>
        <button class="btn-visible" onclick="location.href='coincidencias.html'"><i class="fas fa-handshake"></i> Coincidencias</button>
        
        <div class="dropdown">
          <button class="dropbtn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="dropdown-content" id="myDropdown">
                <a href="sugerencias.html"><i class="fas fa-lightbulb"></i> Sugerencias</a>
                <a href="mis-publicaciones.html"><i class="fas fa-folder-open"></i> Mis publicaciones</a>
                <a href="historial.html"><i class="fas fa-history"></i> Historial</a>
                <a href="lista-chat.html"><i class="fas fa-comments"></i> Chats <span id="notif"></span></a>
                <hr>
                <a href="#" onclick="confirmarCerrarSesion()" style="color: #d32f2f;">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </div>
        </div>
      </div>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="container">
      <h2>Bienvenido a ReÚtiles</h2>
      <h3>Publicaciones disponibles</h3>
      <div id="publicaciones"></div>
    </div>
  </div>

  <div id="reportModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
    <div style="background-color: #fff; padding: 25px; border-radius: 10px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
      <h3>Reportar Publicación</h3>
      <input type="hidden" id="reportProductId">
      <form id="reportForm">
        <select id="reportMotivo" style="width: 100%; padding: 10px; margin-bottom: 10px;" required>
            <option value="Spam o Estafa">Spam o posible estafa</option>
            <option value="No es un útil escolar">No es un útil escolar</option>
            <option value="Artículo dañado">Artículo dañado</option>
        </select>
        <button type="submit" id="btnEnviarReporte">Enviar Reporte</button>
        <button type="button" onclick="cerrarModalReporte()">Cancelar</button>
      </form>
    </div>
  </div>

  <footer class="main-footer">
    <p>&copy; <span id="year"></span> ReÚtiles - Proyecto Escolar</p>
  </footer>

  <script src="js/notificaciones.js"></script>
  <script src="js/menu.js"></script>
  <script>
    const userId = localStorage.getItem('userId');
    document.getElementById("year").textContent = new Date().getFullYear();
    if (!userId || userId === '0') location.href = 'login.html';

    // Captura de nuevo match
    fetch(`${window.backendURL}/api/match/nuevas/${userId}`)
      .then(res => res.json())
      .then(data => {
        if (Array.isArray(data) && data.length > 0) {
          const match = data[0];
          const modal = document.createElement('div');
          modal.className = 'modal-match';
          modal.innerHTML = `
            <div class="modal-content">
              <h3>¡Nuevo Match!</h3>
              <p><b>${match.nombreUsuario}</b> ofrece <b>${match.ofreceEl}</b></p>
              <button onclick="abrirMensaje(${match.producto_id || match.id}, ${match.usuario}, '${encodeURIComponent(match.nombreUsuario)}')">Enviar mensaje</button>
              <button onclick="this.closest('.modal-match').remove()">Cerrar</button>
            </div>
          `;
          document.body.appendChild(modal);
        }
      });

    fetch(`${window.backendURL}/api/match/revisado/${userId}`, { method: 'PUT' });

    async function cargarPublicaciones() {
      try {
        const res = await fetch(`${window.backendURL}/api/productos/todos/${userId}`);
        const productos = await res.json();
        
        if (Array.isArray(productos)) {
          const productosReportados = JSON.parse(localStorage.getItem('productosReportados') || '[]');
          const productosVisibles = productos.filter(p => !productosReportados.includes(p.id || p.producto_id));

          document.getElementById('publicaciones').innerHTML = productosVisibles.map(p => {
            const actualProductId = p.id || p.producto_id;
            // Generación de estrellas
            const estrellas = p.rating ? '★'.repeat(Math.round(p.rating)) : '☆';
            const ratingVal = p.rating ? parseFloat(p.rating).toFixed(1) : '0';

            return `
              <div class="producto" onclick="abrirMensaje(${actualProductId}, ${p.usuario_id}, '${encodeURIComponent(p.nombreUsuario)}')">
                <button class="btn-reportar-bandera" onclick="event.stopPropagation(); abrirModalReporte(${actualProductId})">
                  <i class="fas fa-flag"></i>
                </button>
                <img src="${p.imagen}" alt="">
                <div class="info" style="padding: 10px;">
                  <b><i class="fas fa-user"></i> ${p.nombreUsuario}</b>
                  <div class="rating-stars">${estrellas} (${ratingVal})</div>
                  <p>Ofrece: ${p.ofrece}</p>
                  <p>Busca: ${p.busca}</p>
                </div>
              </div>
            `;
          }).join('');
        }
      } catch (e) { console.error(e); }
    }

    function abrirModalReporte(id) { 
        document.getElementById('reportProductId').value = id;
        document.getElementById('reportModal').style.display = 'flex'; 
    }
    function cerrarModalReporte() { document.getElementById('reportModal').style.display = 'none'; }

    function abrirMensaje(pId, uId, nUser) {
      localStorage.setItem('currentProductId', pId);
      localStorage.setItem('contactoId', uId);
      localStorage.setItem('contactoNombre', decodeURIComponent(nUser));
      location.href = 'enviar-mensaje.html'; 
    }
    
    cargarPublicaciones();
  </script>
</body>
</html>
